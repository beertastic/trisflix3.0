name: Deploy to Beta Subdomain

on:
  push:
    branches: [ "beta" ] # <--- This workflow ONLY fires when you push to the beta branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote beta deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: 4242
          script: /var/www/beta.trisflix.com/beta_deploy.sh
